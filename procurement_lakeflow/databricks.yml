# This is a Databricks asset bundle definition for procurement_lakeflow.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: procurement_lakeflow
  uuid: f1c7d568-1510-4c5a-8878-b89683d48dd7

include:
  - resources/*.yml
  - resources/*/*.yml
sync:
  include:
    - src/**

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  env:
    description: deployment environment

targets:
  dev:
    mode: development
    default: true
    presets:
      name_prefix: dev_${workspace.current_user.short_name}
      source_linked_deployment: false
    workspace:
      host: https://dbc-2e428544-5bd8.cloud.databricks.com/
    variables:
      catalog: workspace
      schema: dev
      env: dev

  prod:
    mode: production
    workspace:
      host: https://dbc-2e428544-5bd8.cloud.databricks.com/
      # We explicitly deploy to /Workspace/Users/abhishek.kumar21@ltimindtree.com to make sure we only have a single copy.
      root_path: /Workspace/Users/abhishek.kumar21@ltimindtree.com/PROD/.bundle/${bundle.name}/${bundle.target}

    presets:
      name_prefix: prod_${workspace.current_user.short_name}
      source_linked_deployment: false
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: abhishek.kumar21@ltimindtree.com
        level: CAN_MANAGE
